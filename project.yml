name: AgoTimer
options:
  bundleIdPrefix: com.agotimer
  deploymentTarget:
    watchOS: "10.0"
    iOS: "17.0"
  xcodeVersion: "1640"
  minimumXcodeGenVersion: "2.38"

targets:
  AgoTimer iOS App:
    type: application
    platform: iOS
    sources:
      - path: "AgoTimer iOS App"
        excludes:
          - "*.entitlements"
      - path: "Shared"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agotimer.ios
        PRODUCT_NAME: AgoTimer
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Ago Timer
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: "AgoTimer iOS App/AgoTimer-iOS.entitlements"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"

  AgoTimer Watch App:
    type: application
    platform: watchOS
    sources:
      - path: "AgoTimer Watch App"
        excludes:
          - Info.plist
          - "*.entitlements"
      - path: "Shared"
    dependencies:
      - target: AgoTimer Widget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agotimer.app
        PRODUCT_NAME: AgoTimer
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Ago Timer
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKRunsIndependentlyOfCompanionApp: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.agotimer
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        CODE_SIGN_ENTITLEMENTS: "AgoTimer Watch App/AgoTimer.entitlements"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"

  AgoTimer Widget:
    type: app-extension
    platform: watchOS
    sources:
      - path: "AgoTimer Widget"
        excludes:
          - "*.entitlements"
          - Info.plist
      - path: "Shared"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agotimer.app.widget
        PRODUCT_NAME: AgoTimerWidget
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        INFOPLIST_FILE: "AgoTimer Widget/Info.plist"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        CODE_SIGN_ENTITLEMENTS: "AgoTimer Widget/AgoTimerWidget.entitlements"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
